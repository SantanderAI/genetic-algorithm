name: Bug report
description: Report a problem with the genetic-algorithm engine
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please do **not** include any
        secrets, API keys, internal URLs, or proprietary content in this report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I run a Population with a custom fitness plugin, it ...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: A minimal code snippet so we can reproduce the issue.
      placeholder: |
        from genetic_algorithm import Population
        pop = Population(pop_size=10, chromosome_size=5, bounds=[(0, 10)] * 5, fitness_fn=...)
        ...
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release tag or commit SHA you are running.
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      description: e.g. 3.11
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / traceback
      description: Paste any error output.
      render: shell
