#
# Release packaging. On a published GitHub Release this workflow builds a
# versioned source tarball and attaches it to the release as a downloadable
# asset.
#
# Replace action references with SHA digests before publishing.

name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  archive:
    name: Build + attach source archive
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to upload the release asset
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Build source archive
        run: |
          set -euo pipefail
          NAME="genetic-algorithm-${GITHUB_REF_NAME:-dev}"
          mkdir -p dist
          tar --exclude-vcs \
              --exclude='./dist' \
              --exclude='./.github' \
              --exclude='__pycache__' \
              --exclude='.pytest_cache' \
              --exclude='.mypy_cache' \
              --exclude='.ruff_cache' \
              --exclude='.coverage*' \
              -czf "dist/${NAME}.tar.gz" .
          (cd dist && sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256")
          ls -l dist

      - name: Upload archive as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: source-archive
          path: dist/

      - name: Attach archive to the GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
